<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super POS Pro</title>

  <link rel="stylesheet" href="style.css">

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Iconos -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />

</head>

<body>

  <!-- LOGIN -->
  <div id="login-screen" class="login-overlay">
    <div class="login-card">
      <div class="logo" style="margin-bottom: 20px;">Super<span>POS</span> Pro</div>
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" id="login-user" placeholder="admin o cajero">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="login-pass" value="1234">
      </div>
      <button class="checkout-btn" onclick="handleLogin()">Ingresar</button>
    </div>
  </div>

  <!-- APP -->
  <div class="app-container" id="main-app" style="display: none;">

    <!-- SIDEBAR -->
    <nav class="sidebar">
      <div class="logo">Super<span>POS</span></div>
      <ul class="nav-links">
        <li><button onclick="openPopup('inicio')"><i class="ri-home-4-line"></i> Inicio</button></li>
        <li><button onclick="openPopup('lista')"><i class="ri-list-check"></i> Productos</button></li>
        <li><button onclick="openPopup('proveedores')"><i class="ri-truck-line"></i> Proveedores</button></li>
        <li><button onclick="openPopup('compras')"><i class="ri-shopping-bag-3-line"></i> Compras</button></li>
        <li><button onclick="openPopup('facturacion')"><i class="ri-file-list-3-line"></i> Facturación</button></li>
        <li><button onclick="openPopup('caja')"><i class="ri-wallet-3-line"></i> Caja</button></li>
        <li><button onclick="openPopup('reportes')"><i class="ri-bar-chart-box-line"></i> Reportes</button></li>
        <li><button onclick="openPopup('descuentos')"><i class="ri-percent-line"></i> Descuentos</button></li>
        <li><button onclick="openPopup('promociones')"><i class="ri-megaphone-line"></i> Promociones</button></li>
      </ul>
    </nav>

    <!-- MAIN -->
    <main class="main-content">
      <header>
        <div class="header-main">
          <h1>Punto de Venta <span id="user-role-badge" class="badge">Cajero</span></h1>
          <div class="header-actions">
            <button onclick="toggleDarkMode()" class="icon-btn">
              <i class="ri-moon-line"></i>
            </button>
            <button class="logout-btn" onclick="handleLogout()">
              <i class="ri-logout-box-line"></i> Cerrar Sesión
            </button>
          </div>
        </div>
        <div class="current-date" id="date-display"></div>
      </header>

      <!-- POS -->
      <div class="pos-grid">

        <!-- BUSCADOR -->
        <div class="scanner-section">
          <div class="input-group">
            <input type="text" id="product-code" placeholder="Buscar producto..." oninput="searchProducts(this.value)">
          </div>
          <div id="search-results"></div>
          <div id="product-preview"></div>
        </div>

        <!-- CARRITO -->
        <div class="cart-section">
          <h2>Carrito</h2>
          <div id="cart-items"></div>

          <div>
            <p>Subtotal: <span id="subtotal">$0</span></p>
            <p>IVA: <span id="iva-amount">$0</span></p>
            <p>Total: <span id="total">$0</span></p>
          </div>

          <select id="payment-method"></select>
          <button onclick="openPaymentModal()">Cobrar</button>
        </div>

      </div>
    </main>
  </div>

  <!-- OVERLAY -->
  <div id="overlay" onclick="closePopups()"></div>

  <!-- 🔥 SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="script.js"></script>

</body>

</html>
